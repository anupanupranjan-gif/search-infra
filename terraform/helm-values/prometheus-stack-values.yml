grafana:
  enabled: true
  adminPassword: "admin123"
  persistence:
    enabled: true
    size: 2Gi
  service:
    type: ClusterIP
  grafana.ini:
    server:
      root_url: "http://localhost/grafana"
      serve_from_sub_path: true
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard

prometheus:
  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1Gi
        cpu: 500m

alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

defaultRules:
  rules:
    etcd: false
    kubeScheduler: false
