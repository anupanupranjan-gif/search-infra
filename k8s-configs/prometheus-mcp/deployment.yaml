apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-mcp
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-mcp
  template:
    metadata:
      labels:
        app: prometheus-mcp
    spec:
      containers:
        - name: prometheus-mcp
          image: prometheus-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PROMETHEUS_URL
              value: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-mcp
  namespace: default
spec:
  selector:
    app: prometheus-mcp
  ports:
    - port: 3001
      targetPort: 3001
