apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexarank-api
  labels:
    app: nexarank-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexarank-api
  template:
    metadata:
      labels:
        app: nexarank-api
    spec:
      containers:
        - name: nexarank-api
          image: nexarank-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ES_URI
              value: "https://searchx-es-http.elasticsearch.svc.cluster.local:9200"
            - name: ES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nexarank-credentials
                  key: es-username
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexarank-credentials
                  key: jwt-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: nexarank-api
spec:
  selector:
    app: nexarank-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
