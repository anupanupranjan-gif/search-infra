apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexarank-ui
  labels:
    app: nexarank-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexarank-ui
  template:
    metadata:
      labels:
        app: nexarank-ui
    spec:
      containers:
        - name: nexarank-ui
          image: nexarank-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: nexarank-ui
spec:
  selector:
    app: nexarank-ui
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
