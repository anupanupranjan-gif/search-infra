apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: searchx
  namespace: elasticsearch
spec:
  version: 8.12.2
  count: 1
  elasticsearchRef:
    name: searchx
  podTemplate:
    spec:
      containers:
        - name: kibana
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1000m
